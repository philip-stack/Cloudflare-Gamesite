<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#141022">
  <title>WUMMS! — Block-Helden</title>
  <meta name="description" content="WUMMS! — Comic-Block-Puzzle mit Tier-Helden: Blöcke legen, Reihen abräumen, Helden-Power zünden und den Bösewicht zurückschlagen.">
  <link rel="stylesheet" href="/fonts/fonts.css">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/icon-180.png">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="/icons/icon-32.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <script src="/theme.js"></script>
  <link rel="stylesheet" href="style.css?v=5">
</head>
<body>
  <div id="app">
    <div class="topbar">
      <a class="btn-back" href="/" aria-label="Zurück">←</a>
      <h1 class="game-title" id="title">WUMMS<span class="bang">!</span></h1>
      <button class="ic-btn" id="btn-sound" title="Ton an/aus">🔊</button>
      <button class="ic-btn" data-theme-toggle aria-label="Hell/Dunkel"></button>
    </div>

    <div class="hud">
      <div class="hud-score"><span class="hs-lbl">Punkte</span><b id="score">0</b></div>
      <div class="hero-chip" id="hero" title="Held wechseln">🦝</div>
      <div class="combo-pop" id="combo"></div>
    </div>

    <div class="meters">
      <div class="meter meter-pow" id="pow-wrap">
        <div class="meter-fill" id="pow-fill"></div>
        <span class="meter-lbl">⚡ POW</span>
      </div>
      <div class="meter meter-threat" id="threat-wrap">
        <div class="meter-fill" id="threat-fill"></div>
        <span class="meter-lbl">😈 Bösewicht</span>
      </div>
    </div>
    <div class="hero-perk" id="hero-perk"></div>

    <button class="pow-btn" id="pow-btn" hidden>⚡ HELDEN-POWER!</button>
    <div class="arm-banner" id="arm-banner" hidden>
      <span id="arm-text">Ziel antippen …</span>
      <button id="arm-cancel">Abbrechen</button>
    </div>

    <div class="board-wrap">
      <canvas id="board"></canvas>
    </div>

    <div class="foot">
      <button class="foot-btn" id="btn-menu">☰ Menü</button>
      <button class="foot-btn" id="btn-board">🏆 Bestenliste</button>
    </div>
  </div>

  <script src="/shared.js"></script>
  <script src="app.js?v=5"></script>
</body>
</html>
