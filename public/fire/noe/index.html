<!DOCTYPE html>
<html lang="de-AT" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0e12" />
  <meta name="robots" content="noindex" />
  <title>Feuerwehr NÖ · Einsätze live</title>
  <meta name="description" content="Aktuelle Feuerwehr-Einsätze in Niederösterreich – live." />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Feuerwehr NÖ" />
  <link rel="stylesheet" href="style.css?v=3" />
</head>
<body>
  <div id="app">
    <header class="top">
      <div class="brand">
        <span class="siren" aria-hidden="true"></span>
        <div class="brand-txt">
          <h1>Feuerwehr <span>Niederösterreich</span></h1>
          <p class="sub">Aktive Einsätze · live</p>
        </div>
      </div>
      <div class="status">
        <span class="live" id="live-dot" aria-hidden="true"></span>
        <span id="stand">verbinde…</span>
      </div>
    </header>

    <section class="stats" id="stats" aria-live="polite"></section>

    <section class="controls">
      <div class="chips" id="kind-chips" role="tablist" aria-label="Einsatzart">
        <button class="chip on" data-kind="all" role="tab" aria-selected="true">Alle</button>
        <button class="chip" data-kind="B" role="tab" aria-selected="false"><i class="dot b"></i>Brand</button>
        <button class="chip" data-kind="T" role="tab" aria-selected="false"><i class="dot t"></i>Technisch</button>
        <button class="chip" data-kind="S" role="tab" aria-selected="false"><i class="dot s"></i>Schadstoff</button>
      </div>
      <div class="filters">
        <label class="field">
          <span class="vh">Bezirk</span>
          <select id="bezirk">
            <option value="">Alle Bezirke</option>
          </select>
        </label>
        <label class="field search">
          <span class="vh">Suche</span>
          <input id="search" type="search" placeholder="Ort oder Meldung suchen…" autocomplete="off" />
        </label>
      </div>
    </section>

    <main id="list" class="list" aria-live="polite"></main>

    <footer class="foot">
      <p>Daten: NÖ Landesfeuerwehrverband (öffentliche <em>Wastl/GRISU</em>-Schnittstelle).
         Inoffizielles Projekt, ohne Gewähr. Kein Ersatz für den Notruf <strong>122</strong>.</p>
    </footer>
  </div>

  <!-- Detail-Overlay -->
  <div id="detail" class="overlay" hidden>
    <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="d-title">
      <button class="x" id="d-close" aria-label="Schließen">✕</button>
      <div id="d-body"></div>
    </div>
  </div>

  <script src="app.js?v=2"></script>
  <script>
    // Eigener Service Worker (Scope /fire/noe/) → installierbar als eigene PWA.
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
    }
  </script>
</body>
</html>
