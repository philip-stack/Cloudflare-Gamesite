<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0e0b">
  <title>Spieleabend-Raum</title>
  <link rel="stylesheet" href="/fonts/fonts.css">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/icon-180.png">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <script src="/theme.js"></script>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg0:#0a0e0b; --felt:#0e1410; --card:rgba(255,252,240,0.045); --card-hi:rgba(255,252,240,0.09);
      --edge:rgba(232,193,90,0.14); --edge-soft:rgba(255,252,240,0.08); --ink:#f4efe2; --muted:#93a396;
      --gold:#e8c15a; --foil:linear-gradient(115deg,#8a6a1c 0%,#e8c15a 25%,#fff3c4 50%,#e8c15a 75%,#8a6a1c 100%);
      --radius:18px; --font-display:"Fraunces",Georgia,serif; --font-ui:"Outfit",system-ui,sans-serif;
      --ease-spring:cubic-bezier(0.34,1.4,0.5,1);
    }
    :root[data-theme="light"] {
      --bg0:#f4f1e6; --felt:#ece9db; --card:rgba(255,255,252,0.72); --card-hi:rgba(255,255,252,0.95);
      --edge:rgba(138,106,28,0.3); --edge-soft:rgba(35,45,35,0.14); --ink:#26301f; --muted:#64705f;
      --gold:#a5851f; --foil:linear-gradient(115deg,#6d5416,#a5851f 30%,#c9a13b 50%,#a5851f 70%,#6d5416);
    }
    body { font-family:var(--font-ui); color:var(--ink); min-height:100dvh; overflow-x:hidden;
      background:radial-gradient(120% 90% at 50% -10%,#1a2a1d 0%,var(--felt) 45%,var(--bg0) 100%); background-attachment:fixed; }
    [data-theme="light"] body { background:radial-gradient(120% 90% at 50% -10%,#dbe6d6 0%,var(--felt) 45%,var(--bg0) 100%); }
    main { max-width:560px; margin:0 auto; padding:calc(18px + env(safe-area-inset-top)) 16px 60px; }
    .topbar { display:flex; align-items:center; gap:12px; margin-bottom:22px; }
    .btn-back, .theme-toggle { width:44px; height:44px; display:grid; place-items:center; flex-shrink:0; border:0;
      border-radius:12px; cursor:pointer; text-decoration:none; font-size:1.2rem; background:var(--card-hi); color:var(--ink);
      box-shadow:0 0 0 1px var(--edge-soft) inset; }
    .topbar h1 { flex:1; font-family:var(--font-display); font-style:italic; font-weight:800; font-size:1.5rem;
      background:var(--foil); background-size:250% 100%; -webkit-background-clip:text; background-clip:text; color:transparent; }
    .card { background:linear-gradient(175deg,var(--card-hi),var(--card)); border-radius:var(--radius); padding:20px 18px;
      margin-bottom:16px; box-shadow:0 0 0 1px var(--edge-soft) inset, 0 10px 28px -16px rgba(0,0,0,0.55); }
    h2 { font-family:var(--font-display); font-size:1.2rem; margin-bottom:6px; }
    .sub { color:var(--muted); font-size:0.88rem; line-height:1.45; margin-bottom:14px; }
    input[type=text] { width:100%; padding:13px 14px; font:inherit; font-size:1rem; text-align:center; letter-spacing:0.08em;
      border:0; border-radius:14px; background:var(--card); color:var(--ink); box-shadow:0 0 0 1px var(--edge-soft) inset; margin-bottom:12px; }
    input:focus { outline:none; box-shadow:0 0 0 1.5px var(--gold) inset; }
    .btn { width:100%; padding:14px; border:0; border-radius:14px; cursor:pointer; font:inherit; font-weight:700; font-size:1rem;
      background:linear-gradient(160deg,#f0cd6e,var(--gold)); color:#1a1508; margin-bottom:10px; box-shadow:0 6px 18px -8px rgba(0,0,0,0.5); }
    .btn.sec { background:var(--card); color:var(--ink); box-shadow:0 0 0 1px var(--edge-soft) inset; font-weight:600; }
    .btn:active { transform:scale(0.98); }
    .games-pick { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px; }
    .gp { display:flex; align-items:center; gap:8px; padding:11px 12px; border-radius:12px; cursor:pointer; border:0;
      background:var(--card); color:var(--ink); box-shadow:0 0 0 1px var(--edge-soft) inset; font:inherit; font-size:0.9rem; text-align:left; }
    .gp.on { box-shadow:0 0 0 2px var(--gold) inset; background:rgba(232,193,90,0.12); }
    .gp .ic { font-size:1.2rem; }
    .code-big { font-family:var(--font-display); font-size:2rem; letter-spacing:0.25em; color:var(--gold); text-align:center; margin:4px 0 2px; }
    .code-hint { text-align:center; color:var(--muted); font-size:0.8rem; margin-bottom:14px; }
    .play-list { display:flex; flex-direction:column; gap:8px; margin-bottom:8px; }
    .play-row { display:flex; align-items:center; gap:12px; text-decoration:none; color:var(--ink); padding:12px 14px; border-radius:14px;
      background:var(--card); box-shadow:0 0 0 1px var(--edge-soft) inset; }
    .play-row .ic { font-size:1.4rem; } .play-row .nm { flex:1; font-weight:700; } .play-row .go { color:var(--gold); font-weight:700; }
    .stand { display:flex; flex-direction:column; gap:6px; }
    .st-row { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:12px; background:var(--card);
      box-shadow:0 0 0 1px var(--edge-soft) inset; }
    .st-row.me { box-shadow:0 0 0 2px var(--gold) inset; }
    .st-row.win { background:linear-gradient(175deg,rgba(232,193,90,0.2),rgba(232,193,90,0.05)); }
    .st-rank { width:28px; font-weight:800; font-family:var(--font-display); text-align:center; }
    .st-name { flex:1; font-weight:700; }
    .st-pts { color:var(--gold); font-weight:800; }
    .st-sub { display:block; color:var(--muted); font-size:0.72rem; font-weight:400; }
    .qr { display:block; margin:10px auto 4px; border-radius:10px; background:#fff; padding:6px; box-shadow:0 0 0 1px var(--edge-soft) inset; }
    .winner { text-align:center; font-family:var(--font-display); font-size:1.15rem; margin:2px 0 14px; }
    *:focus-visible { outline:2px solid var(--gold); outline-offset:2px; }
    .msg { text-align:center; color:var(--muted); font-size:0.85rem; min-height:1em; margin-top:6px; }
    .msg.err { color:#e0645a; }
    .row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .confetti { position:fixed; inset:0; pointer-events:none; z-index:60; }
  </style>
</head>
<body>
  <main>
    <div class="topbar">
      <a class="btn-back" href="/" aria-label="Zurück">←</a>
      <h1>🎉 Spieleabend</h1>
      <button class="theme-toggle" data-theme-toggle aria-label="Hell/Dunkel"></button>
    </div>
    <div id="view"></div>
  </main>

  <script src="/games.js"></script>
  <script src="/qr.js"></script>
  <script>
  (function () {
    const $ = s => document.querySelector(s);
    const esc = s => String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" })[c]);
    const SCORED = (window.GAMES || []).filter(g => g.scored);
    const byKey = window.GAMES_BYKEY || {};
    const getName = () => (localStorage.getItem("bb_name") || "").trim();
    const setName = v => { try { localStorage.setItem("bb_name", String(v).trim().slice(0,16)); } catch {} };
    const deviceId = () => {
      let d = localStorage.getItem("gs_device");
      if (!d) { const a = new Uint8Array(18); crypto.getRandomValues(a); d = [...a].map(b => "abcdefghijklmnopqrstuvwxyz0123456789"[b % 36]).join(""); try { localStorage.setItem("gs_device", d); } catch {} }
      return d;
    };
    const code = () => (localStorage.getItem("gs_party_code") || "").trim().toUpperCase();
    const view = $("#view");
    let poll = null;

    const api = async (body) => {
      const r = await fetch("/api/party", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(body) });
      return { status:r.status, data: await r.json().catch(()=>({})) };
    };

    // ---------- Lobby (kein Raum aktiv) ----------
    function renderLobby(prefillCode) {
      if (poll) { clearInterval(poll); poll = null; }
      let picked = new Set(SCORED.map(g => g.key));   // standardmäßig alle
      view.innerHTML = `
        <div class="card">
          <h2>Neuen Abend starten</h2>
          <p class="sub">Wähle die Spiele des Abends. Jede:r spielt sie — Punkte gibt's nach Platzierung, quer über alle Spiele.</p>
          <input type="text" id="host-name" maxlength="16" placeholder="Dein Name" value="${esc(getName())}">
          <div class="games-pick" id="pick">
            ${SCORED.map(g => `<button class="gp on" data-k="${g.key}"><span class="ic">${g.icon}</span>${esc(g.name)}</button>`).join("")}
          </div>
          <button class="btn" id="create">Raum erstellen</button>
        </div>
        <div class="card">
          <h2>Einem Abend beitreten</h2>
          <p class="sub">Hast du einen Code von Freunden bekommen?</p>
          <input type="text" id="join-name" maxlength="16" placeholder="Dein Name" value="${esc(getName())}">
          <input type="text" id="join-code" maxlength="6" placeholder="Raum-Code" style="text-transform:uppercase">
          <button class="btn sec" id="join">Beitreten</button>
          <div class="msg" id="msg"></div>
        </div>`;
      if (prefillCode && /^[A-Z0-9]{6}$/.test(prefillCode)) {
        $("#join-code").value = prefillCode;
        setMsg("Gib deinen Namen ein und tritt bei 👇");
        $("#join-name").focus();
      }
      view.querySelectorAll(".gp").forEach(b => b.onclick = () => {
        b.classList.toggle("on"); const k = b.dataset.k;
        b.classList.contains("on") ? picked.add(k) : picked.delete(k);
      });
      $("#create").onclick = async () => {
        const name = $("#host-name").value.trim(); if (name) setName(name);
        const games = [...picked];
        if (!games.length) return setMsg("Wähle mindestens ein Spiel", true);
        const { status, data } = await api({ action:"create", games, name, device: deviceId() });
        if (status !== 200) return setMsg(data.error || "Fehler", true);
        try { localStorage.setItem("gs_party_code", data.code); } catch {}
        renderRoom();
      };
      $("#join").onclick = async () => {
        const name = $("#join-name").value.trim(); if (name) setName(name);
        const c = $("#join-code").value.trim().toUpperCase();
        if (!name) return setMsg("Bitte Namen eingeben", true);
        if (!/^[A-Z0-9]{6}$/.test(c)) return setMsg("Code besteht aus 6 Zeichen", true);
        const { status, data } = await api({ action:"join", code:c, name, device: deviceId() });
        if (status !== 200) return setMsg(data.error || "Fehler", true);
        try { localStorage.setItem("gs_party_code", c); } catch {}
        renderRoom();
      };
    }
    const setMsg = (m, err) => { const el = $("#msg"); if (el) { el.className = "msg" + (err?" err":""); el.textContent = m; } };

    // ---------- Raum aktiv ----------
    async function renderRoom() {
      if (poll) { clearInterval(poll); poll = null; }
      const c = code();
      view.innerHTML = `
        <div class="card">
          <h2 style="text-align:center">Raum-Code</h2>
          <div class="code-big">${esc(c)}</div>
          <canvas id="qr" class="qr" width="0" height="0" aria-label="QR-Code zum Beitreten"></canvas>
          <div class="code-hint">Teile den Code oder lass Freunde den QR-Code scannen.</div>
          <div class="row2">
            <button class="btn sec" id="share">📤 Teilen</button>
            <button class="btn sec" id="leave">Verlassen</button>
          </div>
        </div>
        <div class="card">
          <h2>Spiele des Abends</h2>
          <p class="sub">Spiel sie der Reihe nach — dein bestes Ergebnis zählt automatisch für die Wertung.</p>
          <div class="play-list" id="play"></div>
        </div>
        <div class="card">
          <h2>🏆 Wertung</h2>
          <div class="winner" id="winner"></div>
          <div class="stand" id="stand"><p class="sub">Lade …</p></div>
        </div>`;
      $("#leave").onclick = () => { if (confirm("Diesen Spieleabend verlassen?")) { try { localStorage.removeItem("gs_party_code"); } catch {} renderLobby(); } };
      $("#share").onclick = async () => {
        const text = `🎉 Komm zu meinem Spieleabend! Raum-Code: ${c}`;
        const url = location.origin + "/party/";
        try { if (navigator.share) { await navigator.share({ title:"Spieleabend", text: text + "\n" + url }); return; } } catch { return; }
        try { await navigator.clipboard.writeText(text + "\n" + url); alert("Einladung kopiert!"); } catch {}
      };
      // QR-Code mit Beitritts-Link
      try {
        const cv = $("#qr");
        if (cv && window.QR) { QR.toCanvas(location.origin + "/party/?code=" + c, cv, { scale: 4, margin: 2, dark: "#12140f", light: "#ffffff" }); }
      } catch {}
      await refresh();
      poll = setInterval(refresh, 4000);
    }

    async function refresh() {
      const c = code(); if (!c) return;
      let d;
      try { const r = await fetch("/api/party?code=" + encodeURIComponent(c)); d = await r.json(); if (!r.ok) throw 0; }
      catch { return; }
      // Spiele-Deeplinks
      const play = $("#play");
      if (play) play.innerHTML = d.games.map(k => {
        const g = byKey[k]; if (!g) return "";
        return `<a class="play-row" href="${g.href}"><span class="ic">${g.icon}</span><span class="nm">${esc(g.name)}</span><span class="go">Spielen →</span></a>`;
      }).join("");
      // Wertung
      const me = getName().toLowerCase();
      const st = $("#stand"), win = $("#winner");
      const medals = ["🥇","🥈","🥉"];
      if (!d.standings.length) { st.innerHTML = `<p class="sub">Noch keine Ergebnisse — leg los!</p>`; win.textContent = ""; return; }
      const top = d.standings[0];
      const played = d.standings.some(s => s.points > 0);
      win.innerHTML = played ? `👑 Führt: <b>${esc(top.name)}</b> (${top.points} Pkt.)` : "Noch keine Punkte — wer legt vor?";
      st.innerHTML = d.standings.map((s, i) => {
        const perGame = d.games.filter(g => s.scores[g] != null)
          .map(g => `${(byKey[g]||{}).icon||""} ${s.scores[g].toLocaleString("de-AT")}`).join(" · ");
        return `<div class="st-row ${s.name.toLowerCase()===me?"me":""} ${i===0&&played?"win":""}">
          <span class="st-rank">${medals[i]||i+1}</span>
          <span class="st-name">${esc(s.name)}<span class="st-sub">${perGame||"noch nichts gespielt"}</span></span>
          <span class="st-pts">${s.points}</span>
        </div>`;
      }).join("");
    }

    // Start — ?code= aus einem gescannten QR-Link übernimmt den Beitritt
    const urlCode = (new URLSearchParams(location.search).get("code") || "").trim().toUpperCase();
    if (code()) renderRoom();
    else renderLobby(urlCode);
  })();
  </script>
</body>
</html>
