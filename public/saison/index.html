<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0e0b">
  <title>Saison & Liga — Spieleabend</title>
  <meta name="description" content="Die wöchentliche Liga: Punkte nach Platzierung über alle Spiele. Jede Woche eine neue Saison.">
  <link rel="stylesheet" href="/fonts/fonts.css">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/icon-180.png">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <script src="/theme.js"></script>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg0:#0a0e0b; --felt:#0e1410; --card:rgba(255,252,240,0.045); --card-hi:rgba(255,252,240,0.09);
      --edge:rgba(232,193,90,0.14); --edge-soft:rgba(255,252,240,0.08); --ink:#f4efe2; --muted:#93a396;
      --gold:#e8c15a; --foil:linear-gradient(115deg,#8a6a1c 0%,#e8c15a 25%,#fff3c4 50%,#e8c15a 75%,#8a6a1c 100%);
      --radius:18px; --font-display:"Fraunces",Georgia,serif; --font-ui:"Outfit",system-ui,sans-serif;
      --ease-spring:cubic-bezier(0.34,1.4,0.5,1);
    }
    :root[data-theme="light"] {
      --bg0:#f4f1e6; --felt:#ece9db; --card:rgba(255,255,252,0.72); --card-hi:rgba(255,255,252,0.95);
      --edge:rgba(138,106,28,0.3); --edge-soft:rgba(35,45,35,0.14); --ink:#26301f; --muted:#64705f;
      --gold:#a5851f; --foil:linear-gradient(115deg,#6d5416,#a5851f 30%,#c9a13b 50%,#a5851f 70%,#6d5416);
    }
    body { font-family:var(--font-ui); color:var(--ink); min-height:100dvh; overflow-x:hidden;
      background:radial-gradient(120% 90% at 50% -10%,#1a2a1d 0%,var(--felt) 45%,var(--bg0) 100%); background-attachment:fixed; }
    [data-theme="light"] body { background:radial-gradient(120% 90% at 50% -10%,#dbe6d6 0%,var(--felt) 45%,var(--bg0) 100%); }
    main { max-width:560px; margin:0 auto; padding:calc(18px + env(safe-area-inset-top)) 16px 60px; }
    .topbar { display:flex; align-items:center; gap:12px; margin-bottom:22px; }
    .btn-back, .theme-toggle { width:44px; height:44px; display:grid; place-items:center; flex-shrink:0; border:0;
      border-radius:12px; cursor:pointer; text-decoration:none; font-size:1.2rem; background:var(--card-hi); color:var(--ink);
      box-shadow:0 0 0 1px var(--edge-soft) inset; }
    .topbar h1 { flex:1; font-family:var(--font-display); font-style:italic; font-weight:800; font-size:1.5rem;
      background:var(--foil); background-size:250% 100%; -webkit-background-clip:text; background-clip:text; color:transparent; }
    .card { background:linear-gradient(175deg,var(--card-hi),var(--card)); border-radius:var(--radius); padding:20px 18px;
      margin-bottom:16px; box-shadow:0 0 0 1px var(--edge-soft) inset, 0 10px 28px -16px rgba(0,0,0,0.55); }
    h2 { font-family:var(--font-display); font-size:1.2rem; margin-bottom:6px; }
    .sub { color:var(--muted); font-size:0.86rem; line-height:1.45; }
    .season-hero { text-align:center; background:linear-gradient(175deg,rgba(232,193,90,0.16),rgba(232,193,90,0.04)); }
    .season-hero .lbl { color:var(--muted); font-size:0.8rem; letter-spacing:0.08em; text-transform:uppercase; }
    .season-hero .sid { font-family:var(--font-display); font-style:italic; font-size:1.9rem; color:var(--gold); margin:2px 0; }
    .season-hero .rng { color:var(--muted); font-size:0.82rem; }
    .countdown { margin-top:10px; font-weight:700; }
    .countdown b { color:var(--gold); font-variant-numeric:tabular-nums; }
    .stand { display:flex; flex-direction:column; gap:6px; }
    .st-row { display:flex; align-items:center; gap:10px; padding:11px 12px; border-radius:12px; background:var(--card);
      box-shadow:0 0 0 1px var(--edge-soft) inset; }
    .st-row.me { box-shadow:0 0 0 2px var(--gold) inset; }
    .st-row.win { background:linear-gradient(175deg,rgba(232,193,90,0.22),rgba(232,193,90,0.05)); }
    .st-rank { width:30px; font-weight:800; font-family:var(--font-display); text-align:center; font-size:1.05rem; }
    .st-name { flex:1; font-weight:700; }
    .st-sub { display:block; color:var(--muted); font-size:0.72rem; font-weight:400; margin-top:1px; }
    .st-pts { color:var(--gold); font-weight:800; font-size:1.05rem; }
    .st-pts small { color:var(--muted); font-weight:600; font-size:0.66rem; display:block; text-align:right; }
    .leaders { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .lead-row { display:flex; align-items:center; gap:9px; padding:10px 12px; border-radius:12px; background:var(--card);
      box-shadow:0 0 0 1px var(--edge-soft) inset; }
    .lead-row .ic { font-size:1.3rem; } .lead-row .lm { min-width:0; }
    .lead-row .lg { font-size:0.72rem; color:var(--muted); } .lead-row .ln { font-weight:700; font-size:0.9rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .champ { text-align:center; font-family:var(--font-display); font-size:1.05rem; }
    .champ b { color:var(--gold); }
    .me-line { text-align:center; margin-top:10px; font-size:0.9rem; color:var(--muted); }
    .me-line b { color:var(--gold); }
    .empty { color:var(--muted); text-align:center; padding:16px 8px; }
    .btn { display:block; width:100%; padding:14px; border:0; border-radius:14px; cursor:pointer; text-decoration:none; text-align:center;
      font:inherit; font-weight:700; font-size:1rem; background:linear-gradient(160deg,#f0cd6e,var(--gold)); color:#1a1508;
      box-shadow:0 6px 18px -8px rgba(0,0,0,0.5); }
    .btn:active { transform:scale(0.98); }
    *:focus-visible { outline:2px solid var(--gold); outline-offset:2px; }
    @media (prefers-reduced-motion:reduce){ *{ transition:none!important; } }
  </style>
</head>
<body>
  <main>
    <div class="topbar">
      <a class="btn-back" href="/" aria-label="Zurück">←</a>
      <h1>🏆 Saison &amp; Liga</h1>
      <button class="theme-toggle" data-theme-toggle aria-label="Hell/Dunkel"></button>
    </div>
    <div id="view">
      <div class="card"><p class="sub">Lade Saison …</p></div>
    </div>
  </main>

  <script>
  (function () {
    const $ = s => document.querySelector(s);
    const esc = s => String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" })[c]);
    const view = $("#view");
    const me = (localStorage.getItem("bb_name") || "").trim().toLowerCase();
    const fmt = n => Number(n || 0).toLocaleString("de-AT");
    const medals = ["🥇", "🥈", "🥉"];
    let resetTarget = 0, cdTimer = null;

    const fmtDate = iso => { const d = new Date(iso + "T00:00:00Z"); return isNaN(d) ? "" : d.toLocaleDateString("de-AT", { day: "2-digit", month: "2-digit" }); };

    function tickCountdown() {
      const el = $("#cd"); if (!el) return;
      let ms = resetTarget - Date.now();
      if (ms < 0) ms = 0;
      const d = Math.floor(ms / 86400000), h = Math.floor(ms / 3600000) % 24, m = Math.floor(ms / 60000) % 60, s = Math.floor(ms / 1000) % 60;
      el.textContent = (d > 0 ? d + "T " : "") + String(h).padStart(2, "0") + ":" + String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
    }

    function render(d) {
      resetTarget = Date.now() + (d.resetInMs || 0);
      const meRow = d.standings.find(s => s.name.toLowerCase() === me);
      const meRank = meRow ? d.standings.indexOf(meRow) + 1 : 0;

      const standHtml = d.standings.length ? d.standings.map((s, i) => {
        const games = Object.keys(s.games).map(k => (d.games.find(g => g.key === k) || {}).icon || "").join("");
        return `<div class="st-row ${s.name.toLowerCase() === me ? "me" : ""} ${i === 0 ? "win" : ""}">
          <span class="st-rank">${medals[i] || (i + 1)}</span>
          <span class="st-name">${esc(s.name)}<span class="st-sub">${games || "—"}</span></span>
          <span class="st-pts">${s.points}<small>Punkte</small></span>
        </div>`;
      }).join("") : `<p class="empty">Diese Saison hat noch niemand gepunktet.<br>Spiel ein gewertetes Spiel — du eröffnest die Liga! 🎮</p>`;

      const leadHtml = d.games.map(g => `
        <div class="lead-row">
          <span class="ic">${g.icon}</span>
          <span class="lm"><span class="lg">${esc(g.name)}</span><span class="ln">${g.leader ? "👑 " + esc(g.leader.name) : "—"}</span></span>
        </div>`).join("");

      view.innerHTML = `
        <div class="card season-hero">
          <div class="lbl">Aktuelle Saison</div>
          <div class="sid">Woche ${esc(d.season)}</div>
          <div class="rng">${fmtDate(d.weekStart)} – ${fmtDate(d.weekEnd)}</div>
          <div class="countdown">Reset in <b id="cd">…</b></div>
        </div>

        <div class="card">
          <h2>Liga-Tabelle</h2>
          <p class="sub" style="margin-bottom:12px">Punkte nach Platzierung in jedem Spiel dieser Woche — über alle Spiele summiert.</p>
          <div class="stand">${standHtml}</div>
          ${me ? (meRow ? `<div class="me-line">Dein Platz: <b>#${meRank}</b> mit <b>${meRow.points}</b> Punkten</div>`
                        : `<div class="me-line">Du bist noch nicht in der Wertung — leg los!</div>`)
               : `<div class="me-line">Setz im <a href="/profil/" style="color:var(--gold)">Profil</a> einen Namen, um mitzumischen.</div>`}
        </div>

        <div class="card">
          <h2>Spitzenreiter je Spiel</h2>
          <p class="sub" style="margin-bottom:12px">Wer diese Woche in welchem Spiel vorne liegt.</p>
          <div class="leaders">${leadHtml}</div>
        </div>

        ${d.prevChampion ? `<div class="card"><h2>👑 Vorige Saison</h2><p class="champ">Champion: <b>${esc(d.prevChampion.name)}</b> — ${d.prevChampion.points} Punkte</p></div>` : ""}

        <a class="btn" href="/">Spiel wählen &amp; punkten →</a>`;

      if (cdTimer) clearInterval(cdTimer);
      tickCountdown();
      cdTimer = setInterval(tickCountdown, 1000);
    }

    fetch("/api/season")
      .then(r => r.json())
      .then(render)
      .catch(() => { view.innerHTML = `<div class="card"><p class="empty">Konnte die Saison nicht laden — Internet? Später nochmal.</p></div>`; });
  })();
  </script>
</body>
</html>
