<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0e0b">
  <title>Mein Profil — Spieleabend</title>
  <link rel="stylesheet" href="/fonts/fonts.css">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/icon-180.png">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <script src="/theme.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg0:#0a0e0b; --felt:#0e1410; --card:rgba(255,252,240,0.045); --card-hi:rgba(255,252,240,0.09);
      --edge:rgba(232,193,90,0.14); --edge-soft:rgba(255,252,240,0.08); --ink:#f4efe2; --muted:#93a396;
      --gold:#e8c15a; --gold-glow:rgba(232,193,90,0.35);
      --foil:linear-gradient(115deg,#8a6a1c 0%,#e8c15a 25%,#fff3c4 50%,#e8c15a 75%,#8a6a1c 100%);
      --radius:18px; --font-display:"Fraunces",Georgia,serif; --font-ui:"Outfit",system-ui,sans-serif;
      --ease-spring:cubic-bezier(0.34,1.4,0.5,1);
    }
    :root[data-theme="light"] {
      --bg0:#f4f1e6; --felt:#ece9db; --card:rgba(255,255,252,0.72); --card-hi:rgba(255,255,252,0.95);
      --edge:rgba(138,106,28,0.3); --edge-soft:rgba(35,45,35,0.14); --ink:#26301f; --muted:#64705f;
      --gold:#a5851f; --gold-glow:rgba(165,133,31,0.3);
      --foil:linear-gradient(115deg,#6d5416 0%,#a5851f 30%,#c9a13b 50%,#a5851f 70%,#6d5416 100%);
    }
    body {
      font-family:var(--font-ui);
      background:radial-gradient(120% 90% at 50% -10%,#1a2a1d 0%,var(--felt) 45%,var(--bg0) 100%);
      background-attachment:fixed; color:var(--ink); min-height:100vh; min-height:100dvh; overflow-x:hidden;
    }
    [data-theme="light"] body { background:radial-gradient(120% 90% at 50% -10%,#dbe6d6 0%,var(--felt) 45%,var(--bg0) 100%); background-attachment:fixed; }
    main { max-width:560px; margin:0 auto; padding:calc(18px + env(safe-area-inset-top)) 16px 60px; }

    .topbar { display:flex; align-items:center; gap:12px; margin-bottom:26px; }
    .btn-back, .theme-toggle {
      width:44px; height:44px; display:grid; place-items:center; flex-shrink:0;
      border:0; border-radius:12px; cursor:pointer; text-decoration:none; font-size:1.2rem;
      background:var(--card-hi); color:var(--ink);
      box-shadow:0 0 0 1px var(--edge-soft) inset; transition:transform 0.15s var(--ease-spring);
    }
    .btn-back:active, .theme-toggle:active { transform:scale(0.92); }
    .topbar h1 { flex:1; font-family:var(--font-display); font-style:italic; font-weight:800; font-size:1.5rem;
      background:var(--foil); background-size:250% 100%; -webkit-background-clip:text; background-clip:text; color:transparent; }

    /* --- Held: Name + Level --- */
    .hero-card {
      background:linear-gradient(175deg,rgba(232,193,90,0.16),rgba(232,193,90,0.04));
      border-radius:var(--radius); padding:22px 18px; margin-bottom:16px;
      box-shadow:0 0 0 1px var(--edge) inset, 0 10px 28px -14px rgba(0,0,0,0.55);
      text-align:center;
    }
    .avatar { width:80px; height:80px; margin:0 auto 6px; border-radius:50%; display:grid; place-items:center;
      font-size:2.5rem; line-height:1; border:0; cursor:pointer; color:var(--ink);
      background:rgba(232,193,90,0.18); box-shadow:0 0 0 2px var(--gold) inset, 0 6px 18px -8px rgba(0,0,0,0.5);
      transition:transform 0.15s var(--ease-spring); }
    .avatar:active { transform:scale(0.93); }
    .avatar-hint { color:var(--muted); font-size:0.72rem; margin-bottom:10px; letter-spacing:0.03em; }

    /* --- Emoji-Auswahl --- */
    .ovl { position:fixed; inset:0; z-index:50; display:grid; place-items:center; padding:18px;
      background:rgba(6,10,7,0.6); backdrop-filter:blur(6px); animation:fade 0.2s ease; }
    @keyframes fade { from { opacity:0; } }
    .ovl-panel { width:100%; max-width:400px; border-radius:var(--radius); padding:20px 18px;
      background:linear-gradient(175deg,var(--card-hi),var(--card));
      box-shadow:0 0 0 1px var(--edge) inset, 0 20px 50px -20px rgba(0,0,0,0.7); text-align:center;
      max-height:82vh; overflow-y:auto; }
    .ovl-panel h2 { font-family:var(--font-display); font-style:italic; font-weight:800; font-size:1.4rem; margin-bottom:4px;
      background:var(--foil); background-size:250% 100%; -webkit-background-clip:text; background-clip:text; color:transparent; }
    .ovl-panel .sub { color:var(--muted); font-size:0.85rem; margin-bottom:14px; }
    .emoji-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:8px; margin-bottom:16px; }
    .emoji-grid button { aspect-ratio:1; border:0; border-radius:12px; cursor:pointer; font-size:1.5rem; line-height:1;
      background:var(--card); color:var(--ink); box-shadow:0 0 0 1px var(--edge-soft) inset;
      transition:transform 0.1s, box-shadow 0.15s; display:grid; place-items:center; }
    .emoji-grid button:active { transform:scale(0.9); }
    .emoji-grid button.sel { box-shadow:0 0 0 2px var(--gold) inset; background:rgba(232,193,90,0.16); }
    .btn-secondary { width:100%; padding:13px; border:0; border-radius:14px; cursor:pointer; font-family:inherit;
      font-size:0.95rem; font-weight:600; background:var(--card); color:var(--ink);
      box-shadow:0 0 0 1px var(--edge-soft) inset; }
    .btn-secondary:active { transform:scale(0.98); }
    .pname { font-family:var(--font-display); font-weight:700; font-size:1.55rem; }
    .pname .edit { font-size:0.85rem; margin-left:8px; cursor:pointer; opacity:0.6; }
    .noname { color:var(--muted); font-size:0.95rem; }
    .lvl-line { margin-top:12px; font-weight:700; color:var(--gold); letter-spacing:0.02em; }
    .xpbar { height:9px; border-radius:99px; background:rgba(255,255,255,0.09); overflow:hidden; margin:8px 4px 4px;
      box-shadow:0 0 0 1px var(--edge-soft) inset; }
    [data-theme="light"] .xpbar { background:rgba(35,45,35,0.1); }
    .xpfill { height:100%; border-radius:99px; background:var(--foil); background-size:250% 100%; transition:width 0.6s var(--ease-spring); }
    .xpsub { color:var(--muted); font-size:0.78rem; }

    /* --- Kennzahlen --- */
    .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:20px; }
    .stat { background:var(--card); border-radius:14px; padding:14px 8px; text-align:center;
      box-shadow:0 0 0 1px var(--edge-soft) inset; }
    .stat b { display:block; font-family:var(--font-display); font-size:1.5rem; color:var(--gold); }
    .stat span { color:var(--muted); font-size:0.74rem; }

    .sec-title { font-family:var(--font-display); font-weight:700; font-size:1.05rem; margin:8px 2px 12px; }

    /* --- Spiel-Zeilen --- */
    .rows { display:flex; flex-direction:column; gap:10px; }
    .grow {
      display:flex; align-items:center; gap:13px; text-decoration:none; color:var(--ink);
      background:linear-gradient(175deg,var(--card-hi),var(--card)); border-radius:var(--radius); padding:14px 16px;
      box-shadow:0 0 0 1px var(--edge-soft) inset, 0 8px 22px -14px rgba(0,0,0,0.5);
      transition:transform 0.18s var(--ease-spring);
    }
    .grow:active { transform:scale(0.98); }
    .grow .gi { flex-shrink:0; width:46px; height:46px; display:grid; place-items:center; font-size:1.5rem;
      border-radius:12px; background:rgba(232,193,90,0.1); box-shadow:0 0 0 1px var(--edge) inset; }
    .grow .gmeta { flex:1; min-width:0; }
    .grow .gn { font-weight:700; font-size:1.05rem; }
    .grow .gsub { color:var(--muted); font-size:0.82rem; margin-top:2px; display:flex; flex-wrap:wrap; gap:4px 10px; }
    .grow .rank { color:var(--gold); font-weight:700; }
    .grow .arr { color:var(--gold); font-size:1.15rem; flex-shrink:0; }
    .empty { color:var(--muted); font-size:0.9rem; text-align:center; padding:24px 10px; }

    footer { text-align:center; color:var(--muted); font-size:0.82rem; margin-top:34px; }
    footer a { color:var(--muted); text-decoration:none; }
    footer a:hover { color:var(--gold); }
    @media (prefers-reduced-motion:reduce){ *{transition:none!important;} }
  </style>
</head>
<body>
  <main>
    <div class="topbar">
      <a class="btn-back" href="/" aria-label="Zurück">←</a>
      <h1>Mein Profil</h1>
      <button class="theme-toggle" data-theme-toggle aria-label="Hell/Dunkel"></button>
    </div>

    <div class="hero-card">
      <button class="avatar" id="avatar" title="Profilbild wählen">👤</button>
      <div class="avatar-hint" id="avatar-hint">Tippen zum Wählen</div>
      <div id="name-line"></div>
      <div class="lvl-line" id="lvl-line">Spieleabend-Level 1</div>
      <div class="xpbar"><div class="xpfill" id="xpfill" style="width:0%"></div></div>
      <div class="xpsub" id="xpsub"></div>
    </div>

    <div class="stats">
      <div class="stat"><b id="s-badges">0</b><span>Abzeichen</span></div>
      <div class="stat"><b id="s-games">0</b><span>Spiele gespielt</span></div>
      <div class="stat"><b id="s-records">0</b><span>Rekorde</span></div>
    </div>

    <div class="sec-title">Deine Spiele</div>
    <div class="rows" id="rows"></div>

    <footer>
      <a href="/">← Zurück zur Übersicht</a>
    </footer>
  </main>

  <script src="/games.js"></script>
  <script>
  (function () {
    const esc = s => String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" })[c]);
    const GAMES = window.GAMES || [];
    const $ = s => document.querySelector(s);
    const num = n => Number(n || 0);
    const fmt = n => num(n).toLocaleString("de-AT");
    const getName = () => (localStorage.getItem("bb_name") || "").trim();

    // Abzeichen je Spiel (aus dem gemeinsamen System)
    const badgesOf = key => {
      try { return Object.keys(JSON.parse(localStorage.getItem("gs_badges_" + key) || "{}").earned || {}).length; }
      catch { return 0; }
    };
    // Hat der/die Spieler:in dieses Spiel angefasst?
    const played = g => {
      if (g.bestKey && num(localStorage.getItem(g.bestKey)) > 0) return true;
      if (g.gsBadges && badgesOf(g.key) > 0) return true;
      if (localStorage.getItem("gs_onboard_" + g.key)) return true;
      if (g.key === "meeri" && localStorage.getItem("meeri_save_v1")) return true;
      if (g.key === "wuerfelpoker" && localStorage.getItem("wp_local_games")) return true;
      return false;
    };

    // --- Kennzahlen ---
    const badgeSum = GAMES.filter(g => g.gsBadges).reduce((a, g) => a + badgesOf(g.key), 0);
    const recordCount = GAMES.filter(g => g.bestKey && num(localStorage.getItem(g.bestKey)) > 0).length;
    const playedCount = GAMES.filter(played).length;

    // --- Spieleabend-Level (XP aus Abzeichen, Rekorden, gespielten Spielen) ---
    const xp = badgeSum * 100 + recordCount * 80 + playedCount * 40;
    const PER = 400;                          // XP pro Level
    const level = Math.floor(xp / PER) + 1;
    const into = xp - (level - 1) * PER;
    $("#lvl-line").textContent = `Spieleabend-Level ${level}`;
    $("#xpfill").style.width = Math.round(into / PER * 100) + "%";
    $("#xpsub").textContent = `${into} / ${PER} XP bis Level ${level + 1}  ·  ${fmt(xp)} XP gesamt`;
    $("#s-badges").textContent = badgeSum;
    $("#s-games").textContent = playedCount;
    $("#s-records").textContent = recordCount;

    // --- Profilbild (Emoji) ---
    const AVATARS = [
      "🎲","💎","☄️","🚀","🦄","🦝","🐹","🃏","🎯","🕹️","👾","🤖",
      "👑","🌟","🔥","🍀","🎩","🦊","🐼","🐲","🦁","🐯","🐸","🐙",
      "🦉","🌈","⭐","🎮","🍄","🧙","🦖","🎪",
    ];
    const getAvatar = () => localStorage.getItem("gs_avatar") || "";
    const setAvatar = v => { try { v ? localStorage.setItem("gs_avatar", v) : localStorage.removeItem("gs_avatar"); } catch {} };

    // --- Name + Avatar (bearbeitbar) ---
    const renderName = () => {
      const n = getName(), av = getAvatar();
      $("#avatar").textContent = av || (n ? n[0].toUpperCase() : "👤");
      $("#avatar-hint").textContent = av ? "Tippen zum Ändern" : "Tippen für Profilbild";
      $("#name-line").innerHTML = n
        ? `<div class="pname">${esc(n)}<span class="edit" id="edit-name" title="Name ändern">✏️</span></div>`
        : `<div class="noname">Noch kein Name — <a href="#" id="edit-name" style="color:var(--gold)">jetzt festlegen</a><br><small>(gilt für Bestenlisten aller Spiele)</small></div>`;
      const eb = $("#edit-name");
      if (eb) eb.onclick = e => {
        e.preventDefault();
        const v = (prompt("Dein Name für alle Bestenlisten (max. 16 Zeichen):", n) || "").trim().slice(0, 16);
        if (v) { try { localStorage.setItem("bb_name", v); } catch {} renderName(); }
      };
    };
    renderName();

    // --- Emoji-Auswahl-Overlay ---
    $("#avatar").onclick = () => {
      const cur = getAvatar();
      const ovl = document.createElement("div");
      ovl.className = "ovl";
      ovl.innerHTML = `
        <div class="ovl-panel">
          <h2>Profilbild wählen</h2>
          <p class="sub">Ein Emoji, das zu dir passt</p>
          <div class="emoji-grid">
            ${AVATARS.map(e => `<button data-e="${e}" class="${e === cur ? "sel" : ""}">${e}</button>`).join("")}
          </div>
          <button class="btn-secondary" id="av-clear" style="margin-bottom:8px">Kein Emoji (Anfangsbuchstabe)</button>
          <button class="btn-secondary" id="av-close">Schließen</button>
        </div>`;
      document.body.appendChild(ovl);
      const close = () => ovl.remove();
      ovl.onclick = e => { if (e.target === ovl) close(); };
      ovl.querySelector("#av-close").onclick = close;
      ovl.querySelector("#av-clear").onclick = () => { setAvatar(""); renderName(); close(); };
      ovl.querySelectorAll(".emoji-grid button").forEach(b => {
        b.onclick = () => { setAvatar(b.dataset.e); renderName(); close(); };
      });
    };

    // --- Spiel-Zeilen ---
    const rowsEl = $("#rows");
    const list = GAMES.slice().sort((a, b) => (played(b) - played(a)));
    list.forEach(g => {
      const best = g.bestKey ? num(localStorage.getItem(g.bestKey)) : 0;
      const nb = g.gsBadges ? badgesOf(g.key) : 0;
      const bits = [];
      if (best > 0) bits.push(`🏅 Rekord ${fmt(best)}`);
      if (nb > 0) bits.push(`🎖️ ${nb} Abzeichen`);
      if (!played(g)) bits.push(g.tool ? "noch nicht ausprobiert" : "noch nicht gespielt");
      const a = document.createElement("a");
      a.className = "grow"; a.href = g.href;
      a.innerHTML = `
        <span class="gi">${g.icon}</span>
        <span class="gmeta">
          <span class="gn">${esc(g.name)}</span>
          <span class="gsub" data-key="${esc(g.key)}">${bits.map(b => `<span>${b}</span>`).join("")}</span>
        </span>
        <span class="arr">→</span>`;
      rowsEl.appendChild(a);

      // Weltrang nachladen (nur wenn Name gesetzt & Spiel gewertet & Rekord vorhanden)
      if (getName() && g.scored && best > 0) {
        fetch("/api/scores/" + g.key).then(r => r.json()).then(d => {
          const me = getName().toLowerCase();
          const i = (d.top || []).findIndex(row => row.name.toLowerCase() === me);
          if (i >= 0) {
            const sub = a.querySelector(".gsub");
            const el = document.createElement("span");
            el.className = "rank"; el.textContent = `🌍 Weltrang #${i + 1}`;
            sub.appendChild(el);
          }
        }).catch(() => {});
      }
    });
  })();
  </script>
</body>
</html>
