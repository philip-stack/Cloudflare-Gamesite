<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0e0b">
  <title>Funkelfeld</title>
  <link rel="stylesheet" href="/fonts/fonts.css">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/icon-180.png">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="/icons/icon-32.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <script src="/theme.js"></script>
  <script src="/shared.js"></script>
  <link rel="stylesheet" href="style.css?v=12">
</head>
<body>
  <div class="ambience" aria-hidden="true">
    <div class="aurora aurora-a"></div>
    <div class="aurora aurora-b"></div>
    <div class="grain"></div>
  </div>

  <main id="app">
    <div class="topbar">
      <a class="btn-back" href="/" aria-label="Zurück zur Übersicht">←</a>
      <h1><span class="foil">Funkelfeld</span></h1>
      <button class="btn-icon" data-theme-toggle></button>
      <button class="btn-icon" id="btn-sound" title="Ton an/aus">🔊</button>
      <button class="btn-icon" id="btn-badges" title="Meilensteine">🏅</button>
      <button class="btn-icon" id="btn-top" title="Bestenliste">🏆</button>
    </div>

    <div class="hud">
      <div class="hud-score">
        <span id="score">0</span>
        <label>Punkte</label>
      </div>
      <div class="hud-side">
        <div class="hud-best">👑 <span id="best">0</span></div>
        <div class="hud-rank" id="rank-chip"></div>
        <div class="hud-combo off" id="combo-chip">🔥 <span id="combo-n">x2</span></div>
      </div>
    </div>

    <div class="board-wrap" id="board-wrap">
      <div id="board" aria-label="Spielfeld"></div>
      <div id="fx-layer"></div>
    </div>

    <div class="tray" id="tray">
      <div class="slot" data-slot="0"></div>
      <div class="slot" data-slot="1"></div>
      <div class="slot" data-slot="2"></div>
    </div>

    <div class="foot">
      <button class="btn-ghost" id="btn-restart">↺ Neues Spiel</button>
      <button class="btn-ghost" id="btn-undo" title="Einmal pro Spiel gratis">↩︎ Zug zurück</button>
      <button class="btn-ghost" id="btn-name">✏️ <span id="name-label">Name</span></button>
    </div>
  </main>

  <script src="app.js?v=14"></script>
</body>
</html>
