name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # Läuft die komplette Suite aus package.json (Syntax, QR, Scores-API,
      # Cloud-API, Wumms- & Meeri-Logik) — bleibt so automatisch aktuell.
      - name: Alle Tests
        run: npm test
