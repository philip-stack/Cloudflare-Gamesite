name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Syntaxprüfung aller JS-Dateien
        run: node tests/check.mjs
      - name: QR-Encoder-Tests
        run: node tests/qr.test.js
      - name: Scores-API-Tests
        run: node tests/api.test.mjs
