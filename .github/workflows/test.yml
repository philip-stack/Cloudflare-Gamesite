name: Tests

# Läuft bei jedem Push und Pull Request: prüft Syntax aller JS-Dateien
# und die Logik-/API-Tests (npm test braucht keine Abhängigkeiten).
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Tests ausführen
        run: npm test
